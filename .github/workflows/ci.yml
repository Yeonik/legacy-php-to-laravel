name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app-laravel

    steps:
      - uses: actions/checkout@v5

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Tests
        run: php artisan test

      - name: Code style (Pint)
        run: vendor/bin/pint --test

      - name: Static analysis (PHPStan)
        # --memory-limit=1G so the step does not depend on the runner's default
        # php.ini memory_limit. This is a runtime resource, not an analysis
        # setting: the level (6) and coverage are unchanged.
        run: vendor/bin/phpstan analyse --memory-limit=1G
