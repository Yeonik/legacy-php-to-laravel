services:
  # The "before" snapshot. Runs so the case study is reproducible — the point
  # is to read it and compare, not to expose it. Bound to localhost only.
  legacy:
    image: php:8.2-apache
    ports: ["127.0.0.1:8081:80"]
    volumes:
      - ./legacy:/var/www/html
    command: >
      bash -c "docker-php-ext-install mysqli && apache2-foreground"
    depends_on: [legacy-db]

  legacy-db:
    image: mysql:5.7
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cms
    volumes:
      - ./legacy/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  # The "after".
  app:
    build: ./app-laravel
    ports: ["127.0.0.1:8000:8000"]
    volumes:
      - ./app-laravel:/app
    environment:
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_DATABASE: cms
      DB_USERNAME: cms
      DB_PASSWORD: secret
    depends_on: [db]

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: cms
      MYSQL_USER: cms
      MYSQL_PASSWORD: secret
